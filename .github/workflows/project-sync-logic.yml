# SPDX-License-Identifier: Apache-2.0
name: Project Sync Logic

# This workflow only handles two things that Projects v2 built-in workflows
# cannot do on a personal/free account:
#   1. Manual auto-add via addProjectV2ItemById (filter-based Auto-add to
#      project is gated to GitHub Team / Enterprise plans).
#   2. Map <agent>_cli labels to the custom Agent Lane single-select field
#      (built-ins cannot set custom fields from labels). If no label matches
#      on a pull request, infer Agent Lane from Co-authored-by trailers on the
#      PR head commit message (same heuristics as project-backfill).
#
# Status field transitions (Todo / In progress / Done) are handled entirely
# by Projects v2 built-in workflows configured in the project UI:
#   - Item added to project   -> Status = Todo
#   - Item closed             -> Status = Done
#   - Item reopened           -> Status = Todo
#   - Pull request merged     -> Status = Done
#
# See lpasquali/rune-docs#187 for the design rationale.

on:
  workflow_call:
    secrets:
      PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Project
        continue-on-error: true
        uses: actions/github-script@576fcffb8fc295322d7d3ef8348a3e6045a1a7be # v9.0.0.0.0
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_ID = "PVT_kwHOABsqts4BT6xG";
            const AGENT_LANE_FIELD_ID = "PVTSSF_lAHOABsqts4BT6xGzhBM-jU";

            // Option IDs come from GitHub Project "Agent Lane" single-select (project #1).
            // Updated 2026-04-09: Cursor added; GitHub regenerated all option IDs via updateProjectV2Field.
            const AGENT_OPTIONS = {
              "gemini_cli": "f8021f9d",
              "claude_cli": "b1fdabb1",
              "copilot_cli": "734c1610",
              "cursor_cli": "51769f29",
              "human": "c9a63cea"
            };

            function agentOptionFromCoauthorMessage(message) {
              const lines = String(message || "").split(/\r?\n/);
              const trails = [];
              for (const line of lines) {
                const m = line.match(/^Co-authored-by:\s*(.+)$/i);
                if (m) trails.push(m[1].trim());
              }
              for (const t of trails) {
                const low = t.toLowerCase();
                if (low.includes("copilot")) return AGENT_OPTIONS.copilot_cli;
                if (low.includes("cursor")) return AGENT_OPTIONS.cursor_cli;
                if (low.includes("anthropic") || low.includes("claude")) return AGENT_OPTIONS.claude_cli;
                if (low.includes("gemini")) return AGENT_OPTIONS.gemini_cli;
              }
              if (trails.length > 0) return AGENT_OPTIONS.human;
              return null;
            }

            const payload = context.payload;
            const contentId = payload.issue ? payload.issue.node_id : payload.pull_request.node_id;
            const labels = payload.issue ? payload.issue.labels : payload.pull_request.labels;
            const labelNames = labels ? labels.map(l => l.name) : [];

            // 1. Manual auto-add (idempotent)
            const addResult = await github.graphql(`
              mutation($project: ID!, $content: ID!) {
                addProjectV2ItemById(input: {projectId: $project, contentId: $content}) {
                  item { id }
                }
              }
            `, { project: PROJECT_ID, content: contentId });
            const itemId = addResult.addProjectV2ItemById.item.id;

            // 2. Map <agent>_cli labels to Agent Lane; else infer from last PR commit co-authors
            let agentOption = null;
            for (const [label, optionId] of Object.entries(AGENT_OPTIONS)) {
              if (labelNames.includes(label)) {
                agentOption = optionId;
                break;
              }
            }
            if (!agentOption && payload.pull_request) {
              const { owner, repo } = context.repo;
              const sha = payload.pull_request.head && payload.pull_request.head.sha;
              if (sha) {
                const { data: full } = await github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: sha
                });
                const msg = full.commit && full.commit.message ? full.commit.message : "";
                agentOption = agentOptionFromCoauthorMessage(msg);
              }
            }
            if (!agentOption) return;

            await github.graphql(`
              mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project,
                  itemId: $item,
                  fieldId: $field,
                  value: { singleSelectOptionId: $option }
                }) { projectV2Item { id } }
              }
            `, {
              project: PROJECT_ID,
              item: itemId,
              field: AGENT_LANE_FIELD_ID,
              option: agentOption
            });
