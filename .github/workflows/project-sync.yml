# SPDX-License-Identifier: Apache-2.0
# Reusable workflow: Sync issues/PRs to the RUNE project board.
# - Adds new issues to the project
# - Sets Agent Lane based on labels (claude_cli/gemini_cli/copilot_cli)
# - Sets Status based on state:
#     No PR / no branch → Todo
#     Draft PR or branch exists → In progress
#     Closed/merged → Done
name: Project Board Sync

on:
  workflow_call:
    inputs:
      project-number:
        description: "GitHub Project number"
        type: string
        required: false
        default: "1"
      project-owner:
        description: "GitHub Project owner"
        type: string
        required: false
        default: "lpasquali"
    secrets:
      PROJECT_TOKEN:
        description: "PAT with project scope"
        required: true

jobs:
  sync:
    name: Sync to project board
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue/PR to project
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_NUMBER: ${{ inputs.project-number }}
          PROJECT_OWNER: ${{ inputs.project-owner }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);
            const projectOwner = process.env.PROJECT_OWNER;

            // Determine the content node (issue or PR)
            let contentId, labels, state, isDraft, issueNumber;
            if (context.payload.issue) {
              contentId = context.payload.issue.node_id;
              labels = context.payload.issue.labels.map(l => l.name);
              state = context.payload.issue.state;
              issueNumber = context.payload.issue.number;
            } else if (context.payload.pull_request) {
              contentId = context.payload.pull_request.node_id;
              labels = context.payload.pull_request.labels.map(l => l.name);
              state = context.payload.pull_request.state;
              isDraft = context.payload.pull_request.draft;
              issueNumber = context.payload.pull_request.number;
            } else {
              console.log('No issue or PR in payload');
              return;
            }

            // 1. Get project ID and field metadata
            const projectQuery = `query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }`;
            const projResult = await github.graphql(projectQuery, {
              owner: projectOwner,
              number: projectNumber
            });
            const project = projResult.user.projectV2;
            const projectId = project.id;

            // Find Status and Agent Lane fields
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const agentField = project.fields.nodes.find(f => f.name === 'Agent Lane');

            if (!statusField || !agentField) {
              console.log('Missing Status or Agent Lane field');
              return;
            }

            // 2. Add item to project (idempotent)
            const addMutation = `mutation($projectId: ID!, $contentId: ID!) {
              addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                item { id }
              }
            }`;
            const addResult = await github.graphql(addMutation, { projectId, contentId });
            const itemId = addResult.addProjectV2ItemById.item.id;
            console.log(`Item ${itemId} added/found on project`);

            // 3. Determine Agent Lane from labels
            const agentMap = {
              'claude_cli': 'Claude',
              'gemini_cli': 'Gemini',
              'copilot_cli': 'Copilot'
            };
            let agentLane = 'Human';
            for (const [label, lane] of Object.entries(agentMap)) {
              if (labels.includes(label)) {
                agentLane = lane;
                break;
              }
            }
            const agentOption = agentField.options.find(o => o.name === agentLane);

            // 4. Determine Status
            let statusName;
            if (state === 'closed') {
              statusName = 'Done';
            } else if (context.payload.pull_request) {
              statusName = 'In progress';
            } else {
              // For issues: check if there's a linked PR or branch
              // If the event is 'labeled' or 'opened', default to Todo
              // If there's a linked branch/PR, it will get updated when PR events fire
              statusName = 'Todo';

              // Check for linked PRs via timeline
              try {
                const timeline = await github.rest.issues.listEventsForTimeline({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  per_page: 100
                });
                const hasPR = timeline.data.some(e =>
                  e.event === 'cross-referenced' && e.source && e.source.issue && e.source.issue.pull_request
                );
                if (hasPR) {
                  statusName = 'In progress';
                }
              } catch (e) {
                console.log('Could not check timeline:', e.message);
              }
            }
            const statusOption = statusField.options.find(o => o.name === statusName);

            // 5. Update fields
            const updateMutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId,
                itemId: $itemId,
                fieldId: $fieldId,
                value: { singleSelectOptionId: $optionId }
              }) { projectV2Item { id } }
            }`;

            if (statusOption) {
              await github.graphql(updateMutation, {
                projectId, itemId,
                fieldId: statusField.id,
                optionId: statusOption.id
              });
              console.log(`Status set to: ${statusName}`);
            }

            if (agentOption) {
              await github.graphql(updateMutation, {
                projectId, itemId,
                fieldId: agentField.id,
                optionId: agentOption.id
              });
              console.log(`Agent Lane set to: ${agentLane}`);
            }
