# SPDX-License-Identifier: Apache-2.0
name: Docs Deploy

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for MkDocs"
        type: string
        required: false
        default: "3.14"

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt mike
      - name: Deploy "dev" snapshot via mike
        run: |
          # This reusable workflow is intended to be wired to ``push: branches: [main]``
          # in the consumer repo. Versioned tag releases (and the "latest" alias)
          # are managed by the consumer's own ``pages.yml`` which triggers on
          # ``push: tags: [v*]``. To avoid double-managing the "latest" alias and
          # to avoid the ``alias 'latest' already specified as a version`` mike
          # error that the previous fallback produced, we always deploy to a fixed
          # ``dev`` mike version here. The consumer-side version selector exposes
          # ``dev`` alongside any tagged versions.
          mike deploy --push dev
