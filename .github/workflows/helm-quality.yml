# SPDX-License-Identifier: Apache-2.0
name: Helm Quality

on:
  workflow_call:
    inputs:
      chart-dirs:
        description: "Space-separated chart directories to lint"
        type: string
        required: true
      trivy-severity:
        description: "Trivy severity filter"
        type: string
        required: false
        default: "HIGH,CRITICAL"

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      helm: ${{ steps.diff.outputs.helm }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Compute changed paths
        id: diff
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo ".")
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED="."
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo ".")
            fi
          fi
          if printf '%s\n' "$CHANGED" | grep -qE '^(charts/|\.ci/)'; then
            echo "helm=true" >> "$GITHUB_OUTPUT"
          else
            echo "helm=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: RuneGate/Lint/Helm
    needs: [changes]
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Lint charts
        run: |
          for dir in ${{ inputs.chart-dirs }}; do
            echo "Linting ${dir}..."
            helm lint "${dir}"
          done
      - name: Template render (dry run)
        run: |
          for dir in ${{ inputs.chart-dirs }}; do
            CHART_NAME=$(basename "${dir}")
            echo "Rendering ${CHART_NAME}..."
            helm template "${CHART_NAME}" "${dir}" > /dev/null
          done

  trivy:
    name: RuneGate/Security/Trivy-Config
    needs: [changes]
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy config scan
        run: |
          docker run --rm -v "${PWD}:/work" \
            aquasec/trivy:0.65.0 config \
            --severity ${{ inputs.trivy-severity }} \
            --exit-code 1 /work
