# SPDX-License-Identifier: Apache-2.0
name: Merge Gate (needs only)

on:
  workflow_call:
    inputs:
      needs-json:
        description: "JSON from toJson(needs) of the calling merge-gate job"
        type: string
        required: true
      merge-gate-excludes:
        description: "Comma-separated caller job ids to treat as non-blocking when failed"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream job results
        uses: lpasquali/rune-ci/actions/merge-gate-verify@6830fbf5bf25bb58a794b5659e9e1f284dcc4ee9
        with:
          needs-json: ${{ inputs.needs-json }}
          merge-gate-excludes: ${{ inputs.merge-gate-excludes }}
