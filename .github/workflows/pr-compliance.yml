# SPDX-License-Identifier: Apache-2.0
name: PR Compliance

on:
  workflow_call:
    inputs:
      needs-json:
        description: "JSON of all upstream job results (toJson(needs))"
        type: string
        required: true
      merge-gate-excludes:
        description: "Comma-separated job names to exclude from merge gate failure check"
        type: string
        required: false
        default: ""
      pr-body-profile:
        description: "Profile for pr-body-compliance action (consumer or rune-ci)"
        type: string
        required: false
        default: "consumer"

permissions:
  contents: read

jobs:
  pr-body-check:
    name: RuneGate/Process/PR-Body-Compliance
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body structure
        uses: lpasquali/rune-ci/actions/pr-body-compliance@28f0a894fab12882433dd76f31b2d17b78800cbb
        with:
          profile: ${{ inputs.pr-body-profile }}

  rune-gate-policy:
    name: RuneGate/Merge/UpstreamPolicy
    if: always()
    needs: [pr-body-check]
    runs-on: ubuntu-latest
    steps:
      - name: Require PR body compliance when applicable
        run: |
          set -euo pipefail
          case "${{ needs.pr-body-check.result }}" in
            success|skipped) ;;
            *)
              echo "::error::PR body compliance did not succeed (result=${{ needs.pr-body-check.result }})."
              exit 1
              ;;
          esac

      - name: Verify upstream quality jobs
        # Caller repo checkout does not contain ./actions — pin to this repo (same tree as reusable workflows).
        uses: lpasquali/rune-ci/actions/merge-gate-verify@28f0a894fab12882433dd76f31b2d17b78800cbb
        with:
          needs-json: ${{ inputs.needs-json }}
          merge-gate-excludes: ${{ inputs.merge-gate-excludes }}

  ml4-peer-review:
    name: RuneGate/Compliance/ML4-Automated-Approval
    needs: [rune-gate-policy]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR via Automated Quality Gates
        uses: lpasquali/rune-ci/actions/ml4-auto-approve@28f0a894fab12882433dd76f31b2d17b78800cbb

  merge-gate:
    name: Merge Gate
    needs: [pr-body-check, rune-gate-policy, ml4-peer-review]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Finalize merge gate
        run: |
          set -euo pipefail
          ok() {
            case "$1" in success|skipped) return 0 ;; *) return 1 ;; esac
          }
          body="${{ needs.pr-body-check.result }}"
          policy="${{ needs.rune-gate-policy.result }}"
          ml4="${{ needs.ml4-peer-review.result }}"
          echo "pr-body-check: ${body}"
          echo "rune-gate-policy: ${policy}"
          echo "ml4-peer-review: ${ml4}"
          if ! ok "${body}"; then
            echo "::error::PR body check must be success or skipped (got ${body})."
            exit 1
          fi
          if [ "${policy}" != "success" ]; then
            echo "::error::Upstream policy gate must succeed (got ${policy})."
            exit 1
          fi
          if ! ok "${ml4}"; then
            echo "::error::ML4 review job must be success or skipped (got ${ml4})."
            exit 1
          fi
          echo "Merge Gate Satisfied"
