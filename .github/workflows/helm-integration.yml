# SPDX-License-Identifier: Apache-2.0
name: Helm Integration

on:
  workflow_call:
    inputs:
      charts:
        description: "JSON array of chart names to test (e.g., '[\"rune\", \"rune-operator\"]')"
        type: string
        required: true
      path-filter:
        description: "Regex for path change detection"
        type: string
        required: false
        default: '^(charts/|\.ci/)'

permissions:
  contents: read
  packages: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.diff.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Compute changed paths
        id: diff
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo ".")
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED="."
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || echo ".")
            fi
          fi
          if printf '%s\n' "$CHANGED" | grep -qE '${{ inputs.path-filter }}'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  fetch-k8s-versions:
    name: Discover K8s Versions
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.matrix }}
      required_version: ${{ steps.versions.outputs.required_version }}
    steps:
      - name: Query Kubernetes releases
        id: versions
        run: |
          RELEASES=$(git ls-remote --tags --refs https://github.com/kubernetes/kubernetes.git 'v1.*' | \
            awk -F/ '{print $3}' | sed 's/^v//' | \
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | \
            sort -V | uniq)
          SUPPORTED_MINORS=$(printf '%s\n' "$RELEASES" | awk -F. '{print $1"."$2}' | sort -V | uniq | tail -2)
          SELECTED=""
          for minor in $SUPPORTED_MINORS; do
            PICKED=$(printf '%s\n' "$RELEASES" | awk -F. -v m="$minor" '$1"."$2==m {print}' | sort -V | tail -1)
            SELECTED="${SELECTED}${PICKED}"$'\n'
          done
          FINAL=$(printf '%s' "$SELECTED" | sed '/^$/d' | sort -V | uniq)
          REQUIRED_VERSION=$(printf '%s\n' "$FINAL" | sort -V | tail -1)
          MATRIX=$(printf '%s\n' "$FINAL" | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "required_version=$REQUIRED_VERSION" >> "$GITHUB_OUTPUT"

  deployment-test:
    name: Deployment Test (K8s ${{ matrix.k8s-version }})
    needs: [fetch-k8s-versions]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s-version: ${{ fromJson(needs.fetch-k8s-versions.outputs.versions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Start kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:v${{ matrix.k8s-version }}
          wait: 120s
      - name: Test Charts
        run: |
          for chart in $(echo '${{ inputs.charts }}' | jq -r '.[]'); do
            echo "Testing chart: ${chart}"
            helm install "${chart}" "./charts/${chart}" --namespace rune-test --create-namespace --wait --timeout=2m
            kubectl get all -n rune-test
            helm uninstall "${chart}" --namespace rune-test
          done
