# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name (e.g., rune, rune-operator). Required when build-container is true."
        type: string
        required: false
        default: ""
      registry-owner:
        description: "Registry owner/namespace"
        type: string
        required: false
        default: "lpasquali"
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        required: false
        default: "./Dockerfile"
      build-container:
        description: "Build and publish a multi-arch container image"
        type: boolean
        required: false
        default: true
      notify-charts:
        description: "Send repository_dispatch to rune-charts"
        type: boolean
        required: false
        default: false
      generate-sbom:
        description: "Generate CycloneDX SBOM with Syft and attach to release"
        type: boolean
        required: false
        default: false
      slsa-attestation:
        description: "Generate SLSA L3 build provenance attestation"
        type: boolean
        required: false
        default: false
    secrets:
      RUNE_CHARTS_BOT_TOKEN:
        description: "Token for cross-repo dispatch to rune-charts"
        required: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  verify-tag:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify tag ancestry
        run: |
          git fetch origin main
          COMMIT_SHA=$(git rev-parse "${GITHUB_SHA}^{commit}" 2>/dev/null || echo "$GITHUB_SHA")
          if ! git merge-base --is-ancestor "$COMMIT_SHA" origin/main; then
            echo "ERROR: Tagged commit is not reachable from origin/main." >&2
            echo "Tags must only be pushed AFTER merging to main." >&2
            exit 1
          fi

  build-amd64:
    name: Build image (amd64)
    needs: [verify-tag]
    if: inputs.build-container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: lpasquali/rune-ci/actions/docker-setup@main
        id: docker
        with:
          registry-owner: ${{ inputs.registry-owner }}
          image-name: ${{ inputs.image-name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platform: linux/amd64
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker.outputs.full-image }}:${{ github.ref_name }}-amd64
          cache-from: ${{ steps.docker.outputs.cache-from }}
          cache-to: ${{ steps.docker.outputs.cache-to }}

  build-arm64:
    name: Build image (arm64)
    needs: [verify-tag]
    if: inputs.build-container
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: lpasquali/rune-ci/actions/docker-setup@main
        id: docker
        with:
          registry-owner: ${{ inputs.registry-owner }}
          image-name: ${{ inputs.image-name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platform: linux/arm64
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.docker.outputs.full-image }}:${{ github.ref_name }}-arm64
          cache-from: ${{ steps.docker.outputs.cache-from }}
          cache-to: ${{ steps.docker.outputs.cache-to }}

  manifest-and-release:
    name: Create manifest + GitHub Release
    needs: [verify-tag, build-amd64, build-arm64]
    if: >-
      always() &&
      needs.verify-tag.result == 'success' &&
      (needs.build-amd64.result == 'success' || needs.build-amd64.result == 'skipped') &&
      (needs.build-arm64.result == 'success' || needs.build-arm64.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker login
        if: inputs.build-container
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        if: inputs.build-container
        id: manifest
        run: |
          IMAGE="ghcr.io/${{ inputs.registry-owner }}/${{ inputs.image-name }}"
          TAG="${{ github.ref_name }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"
          DIGEST=$(docker buildx imagetools inspect \
            "${IMAGE}:${TAG}" \
            --format '{{.Manifest.Digest}}' 2>/dev/null \
            | grep -oP 'sha256:[a-f0-9]+' | head -1)
          if [ -z "$DIGEST" ]; then
            DIGEST=$(docker buildx imagetools inspect \
              "${IMAGE}:${TAG}" \
              2>&1 | grep -oP 'Digest:\s+\Ksha256:[a-f0-9]+' | head -1)
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install Syft
        if: inputs.generate-sbom && inputs.build-container
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        if: inputs.generate-sbom && inputs.build-container
        run: |
          IMAGE="ghcr.io/${{ inputs.registry-owner }}/${{ inputs.image-name }}"
          syft "${IMAGE}:${{ github.ref_name }}-amd64" \
            -o cyclonedx-json=sbom.cdx.json

      - name: Attest build provenance — SLSA L3
        if: inputs.slsa-attestation && inputs.build-container
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ inputs.registry-owner }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag

      - name: Upload SBOM to release
        if: inputs.generate-sbom && inputs.build-container
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" sbom.cdx.json \
            --clobber

      - name: Notify rune-charts
        if: inputs.notify-charts
        env:
          CROSS_REPO_TOKEN: ${{ secrets.RUNE_CHARTS_BOT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CROSS_REPO_TOKEN:-}" ]; then
            echo "RUNE_CHARTS_BOT_TOKEN is not set. Skipping."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${CROSS_REPO_TOKEN}" \
            https://api.github.com/repos/lpasquali/rune-charts/dispatches \
            -d @- <<DISPATCH_JSON
          {
            "event_type": "image-published",
            "client_payload": {
              "source_repo": "${GITHUB_REPOSITORY}",
              "image_name": "ghcr.io/${{ inputs.registry-owner }}/${{ inputs.image-name }}",
              "image_tag": "${{ github.ref_name }}"
            }
          }
          DISPATCH_JSON
