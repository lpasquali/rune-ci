# SPDX-License-Identifier: Apache-2.0
name: Code Scanning (CodeQL)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: CodeQL/Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@17573ee151949df5a0fbc56c9ca28d1ac9c46dca # v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@17573ee151949df5a0fbc56c9ca28d1ac9c46dca # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@17573ee151949df5a0fbc56c9ca28d1ac9c46dca # v3
