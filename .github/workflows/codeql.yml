# SPDX-License-Identifier: Apache-2.0
name: Code Scanning (CodeQL)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: CodeQL/Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@21ced69c8819ebffc044fbea9738e35c9d5a453d # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/.*@9dd920159e2dfd9d681ce47c907ae8fc2a872de2 # v4.35.2.35.1
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/.*@9dd920159e2dfd9d681ce47c907ae8fc2a872de2 # v4.35.2.35.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/.*@9dd920159e2dfd9d681ce47c907ae8fc2a872de2 # v4.35.2.35.1
        with:
          category: "/language:python"
