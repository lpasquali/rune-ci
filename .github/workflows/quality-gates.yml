# SPDX-License-Identifier: Apache-2.0
# CI for CI — validates rune-ci's own workflows and actions.
name: Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  lint-workflows:
    name: RuneGate/Lint/ActionLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          ./actionlint

  lint-yaml:
    name: RuneGate/Lint/YAMLLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: yamllint
        run: |
          pip install yamllint
          yamllint .github/workflows/ actions/

  security-secrets:
    name: RuneGate/Security/SecretScanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: lpasquali/rune-ci/actions/gitleaks-scan@main
        with:
          gitleaks-version: "8.24.3"
          event-name: ${{ github.event_name }}
          pr-base-sha: ${{ github.event.pull_request.base.sha }}
          pr-head-sha: ${{ github.event.pull_request.head.sha }}
          push-before-sha: ${{ github.event.before }}
          current-sha: ${{ github.sha }}

  integration-tests:
    name: RuneGate/Test/IntegrationSuite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Run Python unit tests
        run: pytest tests/ -v --tb=short
      - name: Run workflow structure tests
        run: ./tests/test_workflow_structure.sh

  pr-body-check:
    name: RuneGate/Process/PR-Body-Compliance
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body structure
        uses: ./actions/pr-body-compliance
        with:
          profile: rune-ci

  merge-gate:
    name: Merge Gate
    if: always()
    needs: [lint-workflows, lint-yaml, security-secrets, integration-tests, pr-body-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gates passed
        uses: ./actions/merge-gate-verify
        with:
          needs-json: ${{ toJson(needs) }}

  ml4-peer-review:
    name: RuneGate/Compliance/ML4-Automated-Approval
    needs: [merge-gate]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: ./actions/ml4-auto-approve
