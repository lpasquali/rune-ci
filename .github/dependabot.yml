#
# Dependabot configuration for rune-ci itself.
# Monitors third-party GitHub Actions used in reusable workflows and
# composite actions, and proposes SHA-pinned version bumps.
#
# For consumer repos that depend on rune-ci, see:
#   templates/caller-dependabot.yml

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
